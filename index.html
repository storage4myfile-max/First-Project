<style>
:root {
  --bg: #0A0F1E;
  --bg2: #111827;
  --bg3: #1A2235;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #F0F4FF;
  --text2: #8899BB;
  --text3: #55688A;
  --accent: #C8A96E;
  --accent2: #E8C98E;
  --green: #4ADE80;
  --red: #F87171;
  --blue: #60A5FA;
  --purple: #A78BFA;
  --amber: #FCD34D;
  --font-serif: 'DM Serif Display', Georgia, serif;
  --font-sans: 'DM Sans', system-ui, sans-serif;
  --r: 12px;
  --r2: 8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);font-size:14px;max-width:480px;margin:0 auto;position:relative;overflow-x:hidden}

/* SPLASH */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;gap:12px;transition:opacity .4s}
#splash h1{font-family:var(--font-serif);font-size:32px;color:var(--accent);letter-spacing:.02em}
#splash p{font-size:13px;color:var(--text2)}
.splash-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 1.2s infinite alternate}
.splash-dot:nth-child(2){animation-delay:.2s}.splash-dot:nth-child(3){animation-delay:.4s}
.splash-dots{display:flex;gap:6px;margin-top:8px}
@keyframes pulse{from{opacity:.2;transform:scale(.8)}to{opacity:1;transform:scale(1)}}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between}
.topbar-brand{font-family:var(--font-serif);font-size:20px;color:var(--accent);letter-spacing:.02em}
.topbar-sub{font-size:11px;color:var(--text3);margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:8px}
.icon-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border2);background:var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--text2);transition:all .15s}
.icon-btn:hover{background:var(--bg2);color:var(--text)}
.notif-pill{background:var(--red);color:#fff;border-radius:10px;font-size:10px;font-weight:600;padding:1px 5px;position:absolute;top:-4px;right:-4px}

/* TABS */
.tabs{display:flex;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:61px;z-index:99}
.tab{flex:1;padding:10px 4px;text-align:center;font-size:12px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* CONTENT */
.content{padding:16px;min-height:calc(100vh - 120px);padding-bottom:80px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:-20px;right:-20px;width:60px;height:60px;border-radius:50%;background:var(--accent);opacity:.05}
.stat-num{font-family:var(--font-serif);font-size:26px;color:var(--accent)}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:2px;font-weight:500;text-transform:uppercase;letter-spacing:.05em}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
.card-head{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-head-title{font-size:13px;font-weight:600;color:var(--text);letter-spacing:.02em}

/* BADGES */
.badge{display:inline-flex;align-items:center;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.badge-gold{background:rgba(200,169,110,.15);color:var(--accent);border:1px solid rgba(200,169,110,.3)}
.badge-blue{background:rgba(96,165,250,.1);color:var(--blue);border:1px solid rgba(96,165,250,.2)}
.badge-green{background:rgba(74,222,128,.1);color:var(--green);border:1px solid rgba(74,222,128,.2)}
.badge-red{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.2)}
.badge-purple{background:rgba(167,139,250,.1);color:var(--purple);border:1px solid rgba(167,139,250,.2)}
.badge-amber{background:rgba(252,211,77,.1);color:var(--amber);border:1px solid rgba(252,211,77,.2)}

/* CLIENT ROWS */
.client-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;position:relative}
.client-row:last-child{border-bottom:none}
.client-row:active{background:var(--bg3)}
.avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-serif);font-size:15px;font-weight:400;flex-shrink:0;border:1px solid var(--border2)}
.av0{background:rgba(96,165,250,.15);color:var(--blue)}
.av1{background:rgba(167,139,250,.15);color:var(--purple)}
.av2{background:rgba(74,222,128,.15);color:var(--green)}
.av3{background:rgba(200,169,110,.15);color:var(--accent)}
.av4{background:rgba(248,113,113,.15);color:var(--red)}
.av5{background:rgba(252,211,77,.15);color:var(--amber)}
.client-info{flex:1;min-width:0}
.client-name{font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.client-meta{font-size:11px;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:5px}
.risk-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.client-right{text-align:right;flex-shrink:0}
.client-aum{font-size:13px;font-weight:600;color:var(--accent)}
.client-seg{font-size:10px;color:var(--text3);margin-top:2px}
.bday-tag{font-size:10px;color:var(--amber);font-weight:600}

/* NOTIF ROWS */
.notif-row{display:flex;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border);align-items:flex-start}
.notif-row:last-child{border-bottom:none}
.notif-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.notif-body{flex:1;min-width:0}
.notif-title{font-size:13px;font-weight:500;color:var(--text)}
.notif-desc{font-size:11px;color:var(--text3);margin-top:3px;line-height:1.5}
.notif-time{font-size:10px;color:var(--text3);margin-top:4px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;font-size:12px;font-weight:500;border-radius:var(--r2);border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .15s;font-family:var(--font-sans)}
.btn:active{transform:scale(.97)}
.btn-gold{background:var(--accent);color:#0A0F1E;border-color:var(--accent);font-weight:600}
.btn-gold:hover{background:var(--accent2)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;padding:12px 14px;border-top:1px solid var(--border)}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:14px}
.search-wrap input{width:100%;padding:10px 14px 10px 38px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);font-size:13px;font-family:var(--font-sans);outline:none}
.search-wrap input::placeholder{color:var(--text3)}
.search-wrap input:focus{border-color:rgba(200,169,110,.4)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--text3)}

/* PROFILE */
.profile-hero{padding:20px 14px;display:flex;gap:14px;align-items:center;border-bottom:1px solid var(--border)}
.profile-avatar{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-serif);font-size:20px;border:2px solid var(--accent);flex-shrink:0}
.profile-name{font-family:var(--font-serif);font-size:20px;color:var(--text)}
.profile-sub{font-size:12px;color:var(--text3);margin-top:3px}
.profile-aum{font-family:var(--font-serif);font-size:24px;color:var(--accent)}
.profile-aum-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.fields-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:16px 14px}
.field-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.field-val{font-size:13px;color:var(--text);font-weight:500}

/* FORM */
.form-wrap{display:flex;flex-direction:column;gap:14px}
.form-group label{display:block;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r2);color:var(--text);font-size:13px;font-family:var(--font-sans);outline:none;transition:border-color .15s}
.form-group input:focus,.form-group select:focus{border-color:rgba(200,169,110,.5)}
.form-group select option{background:var(--bg2)}
.form-group textarea{resize:none;height:70px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-actions{display:flex;gap:10px;padding-top:4px}

/* CALENDAR */
.cal-month{font-family:var(--font-serif);font-size:16px;color:var(--accent);margin:16px 0 8px;padding:0 2px}
.cal-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border)}
.cal-row:last-child{border-bottom:none}
.cal-date{width:36px;height:36px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.cal-day{font-size:16px;font-weight:600;color:var(--text);line-height:1}
.cal-mon{font-size:9px;color:var(--text3);text-transform:uppercase}

/* SECTION LABEL */
.sec-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin:18px 0 8px;padding:0 2px}

/* EMPTY */
.empty-state{padding:40px 20px;text-align:center;color:var(--text3);font-size:13px}
.empty-icon{font-size:32px;margin-bottom:8px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:flex-end;backdrop-filter:blur(4px)}
.modal{background:var(--bg2);border-radius:var(--r) var(--r) 0 0;padding:20px;width:100%;max-height:92vh;overflow-y:auto;border-top:1px solid var(--border2);animation:slideUp .25s ease}
.modal-title{font-family:var(--font-serif);font-size:20px;color:var(--accent);margin-bottom:18px}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r2);padding:10px 18px;font-size:13px;color:var(--text);z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

/* FAB */
.fab{position:fixed;bottom:20px;right:20px;width:52px;height:52px;border-radius:50%;background:var(--accent);color:#0A0F1E;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;box-shadow:0 4px 20px rgba(200,169,110,.4);z-index:200;transition:transform .15s;border:none;font-weight:300}
.fab:active{transform:scale(.92)}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:32px;gap:8px;color:var(--text3);font-size:13px}
.spinner{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* BACK BTN */
.back-btn{display:flex;align-items:center;gap:6px;color:var(--text2);font-size:13px;cursor:pointer;margin-bottom:14px;padding:4px 0}
.back-btn:active{color:var(--accent)}

/* SECTION DIVIDER */
.divider{height:1px;background:var(--border);margin:4px 0}
</style>
</head>
<body>

<div id="splash">
  <h1>ClientBook</h1>
  <p>MFD Client Manager · ARN-253228</p>
  <div class="splash-dots">
    <div class="splash-dot"></div>
    <div class="splash-dot"></div>
    <div class="splash-dot"></div>
  </div>
</div>

<div id="app" style="display:none">
  <div class="topbar">
    <div>
      <div class="topbar-brand">ClientBook</div>
      <div class="topbar-sub">ARN-253228 · Nadiad</div>
    </div>
    <div class="topbar-right" style="position:relative">
      <div class="icon-btn" onclick="switchTab('notifications')" style="position:relative">
        🔔
        <span class="notif-pill" id="notif-count" style="display:none">0</span>
      </div>
      <div class="icon-btn" onclick="openAddModal()">＋</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="dashboard" onclick="switchTab('dashboard')">Dashboard</div>
    <div class="tab" data-tab="clients" onclick="switchTab('clients')">Clients</div>
    <div class="tab" data-tab="notifications" onclick="switchTab('notifications')">Alerts</div>
    <div class="tab" data-tab="calendar" onclick="switchTab('calendar')">Birthdays</div>
  </div>

  <div class="content" id="content"></div>
  <button class="fab" onclick="openAddModal()">＋</button>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://udtxlsfqrwfbqgfshayg.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVkdHhsc2ZxcndmYnFnZnNoYXlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NjY3NzcsImV4cCI6MjA5MzU0Mjc3N30.AB8KneZsKL_OYt8ab8Ytpn65p-l6n3FA7-CxHharcwo';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const TODAY = new Date();
let activeTab = 'dashboard';
let clients = [];
let notifications = [];
let selectedClient = null;
let showAddModal = false;
let editMode = false;

// ─── INIT ──────────────────────────────────────────────────────
async function init() {
  await loadClients();
  await loadNotifications();
  await generateBirthdayNotifications();
  hideSplash();
  render();
  updateNotifBadge();
}

function hideSplash() {
  const s = document.getElementById('splash');
  s.style.opacity = '0';
  setTimeout(() => { s.style.display = 'none'; document.getElementById('app').style.display = 'block'; }, 400);
}

// ─── DATA ──────────────────────────────────────────────────────
async function loadClients() {
  const { data, error } = await sb.from('clients').select('*').order('name');
  if (!error) clients = data || [];
}

async function loadNotifications() {
  const { data, error } = await sb.from('notifications').select('*, clients(name)').order('created_at', { ascending: false });
  if (!error) notifications = data || [];
}

async function generateBirthdayNotifications() {
  for (const c of clients) {
    if (!c.dob) continue;
    const days = daysUntilBirthday(c.dob);
    if (days <= 7) {
      const exists = notifications.find(n => n.client_id === c.id && n.type === 'birthday' && !n.is_done);
      if (!exists) {
        const title = days === 0 ? `🎂 Birthday TODAY — ${c.name}` : `🎂 Birthday in ${days} days — ${c.name}`;
        const desc = days === 0 ? `${c.name} is celebrating their birthday today! Send a warm wish.` : `${c.name}'s birthday is on ${formatDate(c.dob)}. Prepare a personalised message.`;
        await sb.from('notifications').insert({ client_id: c.id, type: 'birthday', title, description: desc, due_date: c.dob });
      }
    }
  }
  await loadNotifications();
}

async function saveClient(data) {
  if (editMode && selectedClient) {
    const { error } = await sb.from('clients').update(data).eq('id', selectedClient.id);
    if (!error) { showToast('Client updated ✓'); }
    else { showToast('Error: ' + error.message); return; }
  } else {
    const { error } = await sb.from('clients').insert(data);
    if (!error) { showToast('Client added ✓'); }
    else { showToast('Error: ' + error.message); return; }
  }
  await loadClients();
  await generateBirthdayNotifications();
  updateNotifBadge();
  closeModal();
  render();
}

async function dismissNotif(id) {
  await sb.from('notifications').update({ is_done: true }).eq('id', id);
  await loadNotifications();
  updateNotifBadge();
  render();
}

async function deleteClient(id) {
  if (!confirm('Delete this client? This cannot be undone.')) return;
  await sb.from('clients').delete().eq('id', id);
  await loadClients();
  selectedClient = null;
  render();
  showToast('Client deleted');
}

// ─── HELPERS ──────────────────────────────────────────────────
function daysUntilBirthday(dob) {
  const d = new Date(dob);
  const today = new Date();
  today.setHours(0,0,0,0);
  let next = new Date(today.getFullYear(), d.getMonth(), d.getDate());
  if (next < today) next.setFullYear(today.getFullYear() + 1);
  return Math.round((next - today) / 86400000);
}

function formatBday(dob) {
  const days = daysUntilBirthday(dob);
  if (days === 0) return '🎂 Today!';
  if (days <= 7) return `🎂 in ${days}d`;
  const d = new Date(dob);
  return `${d.getDate()} ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]}`;
}

function formatDate(d) {
  if (!d) return '—';
  const dt = new Date(d);
  return `${dt.getDate()} ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][dt.getMonth()]} ${dt.getFullYear()}`;
}

function initials(name) {
  return name.split(' ').map(x => x[0]).join('').slice(0,2).toUpperCase();
}

function riskColor(r) {
  if (r === 'Aggressive') return '#F87171';
  if (r === 'Moderate') return '#FCD34D';
  return '#4ADE80';
}

function updateNotifBadge() {
  const pending = notifications.filter(n => !n.is_done).length;
  const el = document.getElementById('notif-count');
  if (el) { el.textContent = pending; el.style.display = pending > 0 ? 'block' : 'none'; }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function switchTab(tab) {
  activeTab = tab;
  selectedClient = null;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  render();
}

// ─── RENDER ───────────────────────────────────────────────────
function render() {
  const c = document.getElementById('content');
  if (activeTab === 'dashboard') c.innerHTML = renderDashboard();
  else if (activeTab === 'clients') c.innerHTML = selectedClient ? renderProfile() : renderClients();
  else if (activeTab === 'notifications') c.innerHTML = renderNotifications();
  else if (activeTab === 'calendar') c.innerHTML = renderCalendar();
}

      <div class="stat-card"><div class="stat-num">${pending}</div><div class="stat-lbl">Pending Alerts</div></div>
    </div>

    ${upcoming.length ? `
    <div class="sec-label">Upcoming Birthdays</div>
    <div class="card">
      ${upcoming.slice(0,5).map((c,i) => `

          </div>
          <div class="client-right">
            <div class="bday-tag">${formatBday(c.dob)}</div>
            <div class="client-aum">₹${parseFloat(c.aum||0).toFixed(1)}Cr</div>
          </div>
        </div>`).join('')}
    </div>` : ''}

    ${pending > 0 ? `
    <div class="sec-label">Active Alerts</div>
    <div class="card">
      ${notifications.filter(n=>!n.is_done).slice(0,3).map(n => `
        <div class="notif-row">
          <div class="notif-icon" style="background:rgba(200,169,110,.1)">${n.type==='birthday'?'🎂':n.type==='sip'?'📋':n.type==='kyc'?'🔔':'📈'}</div>
          <div class="notif-body">
            <div class="notif-title">${n.title}</div>
            <div class="notif-desc">${n.description||''}</div>
          </div>
          <button class="btn btn-sm" onclick="dismissNotif('${n.id}')">✓</button>
        </div>`).join('')}
    </div>` : `
    <div class="card" style="padding:20px;text-align:center;color:var(--text3);font-size:13px">
      <div style="font-size:24px;margin-bottom:6px">✨</div>
      All clear — no pending alerts
    </div>`}

    <div class="card">
      ${clients.slice(0,4).map(c => `
        <div class="client-row" onclick="openProfile('${c.id}')">
          <div class="avatar av${c.id.charCodeAt(0)%6}">${initials(c.name)}</div>
          <div class="client-info">
            <div class="client-name">${c.name}</div>
            <div class="client-meta"><span class="risk-dot" style="background:${riskColor(c.risk_profile)}"></span>${c.risk_profile} · ${c.horizon||'—'}</div>
          </div>

            <div class="client-aum">₹${parseFloat(c.aum||0).toFixed(1)}Cr</div>

function renderClients() {
  return `

function renderClientList(list) {

  return `<div class="card">${list.map(c => `
    <div class="client-row" onclick="openProfile('${c.id}')">

      <div class="client-info">
        <div class="client-name">${c.name}</div>
        <div class="client-meta">
          <span class="risk-dot" style="background:${riskColor(c.risk_profile)}"></span>
          ${c.risk_profile} · ${c.city||'—'} · ${c.dob ? formatBday(c.dob) : '—'}

function filterClients(q) {
  const filtered = clients.filter(c =>
    c.name.toLowerCase().includes(q.toLowerCase()) ||
    (c.city||'').toLowerCase().includes(q.toLowerCase()) ||
    (c.risk_profile||'').toLowerCase().includes(q.toLowerCase()) ||
    (c.segment||'').toLowerCase().includes(q.toLowerCase())
  );
  document.getElementById('clients-list').innerHTML = renderClientList(filtered);
}

      <div class="card" style="padding:30px;text-align:center">

    `<div class="sec-label">${active.length} Pending Alert${active.length>1?'s':''}</div>
    <div class="card">
      ${active.map(n => `
        <div class="notif-row">

          <div class="notif-body"><div class="notif-title">${n.title}</div></div>
        </div>`).join('')}
    </div>` : ''}`;
}

function renderCalendar() {
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const byMonth = {};
  clients.filter(c => c.dob).forEach(c => {
    const m = new Date(c.dob).getMonth();
    if (!byMonth[m]) byMonth[m] = [];
    byMonth[m].push(c);
  });
  if (!Object.keys(byMonth).length) return `<div class="empty-state"><div class="empty-icon">📅</div>No birthdays added yet</div>`;
  return months.map((m, i) => {
    const list = byMonth[i];
    if (!list) return '';
    return `
      <div class="cal-month">${m}</div>
      <div class="card">
        ${list.sort((a,b) => new Date(a.dob).getDate()-new Date(b.dob).getDate()).map(c => {
          const d = new Date(c.dob);
          const days = daysUntilBirthday(c.dob);
          return `<div class="cal-row" onclick="openProfile('${c.id}')">
            <div class="cal-date" style="${days<=7?'border-color:var(--amber);':''}">
              <div class="cal-day" style="${days<=7?'color:var(--amber);':''}">${d.getDate()}</div>
              <div class="cal-mon">${m.slice(0,3)}</div>
            </div>
            <div class="avatar av${c.id.charCodeAt(0)%6}" style="width:36px;height:36px;font-size:13px">${initials(c.name)}</div>
            <div class="client-info">
              <div class="client-name">${c.name}</div>
              <div class="client-meta">${days===0?'🎂 Today!':days<=30?`in ${days} days`:'upcoming'} · ${c.segment||'Retail'}</div>
            </div>
          </div>`;
        }).join('')}
      </div>`;
  }).join('');
}

function submitClientForm() {
  const name = document.getElementById('f-name').value.trim();
  const dob = document.getElementById('f-dob').value;
  const aum = document.getElementById('f-aum').value;
  if (!name || !dob || !aum) { showToast('Name, DOB and AUM are required'); return; }
  const data = {
    name,
    dob,
    aum: parseFloat(aum),
    phone: document.getElementById('f-phone').value.trim() || null,
    email: document.getElementById('f-email').value.trim() || null,
    pan: (document.getElementById('f-pan').value.trim() || '').toUpperCase() || null,
    city: document.getElementById('f-city').value.trim() || null,
    segment: document.getElementById('f-segment').value,
    risk_profile: document.getElementById('f-risk').value,
    horizon: document.getElementById('f-horizon').value,
    sip_amount: document.getElementById('f-sip').value ? parseFloat(document.getElementById('f-sip').value) : null,
    nominee: document.getElementById('f-nominee').value.trim() || null,
    notes: document.getElementById('f-notes').value.trim() || null,
  };
  saveClient(data);
}

function showModal(html) {
  let overlay = document.getElementById('modal-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.id = 'modal-overlay';
    overlay.onclick = (e) => { if(e.target===overlay) closeModal(); };
    document.body.appendChild(overlay);
  }
  overlay.innerHTML = `<div class="modal">${html}</div>`;
  overlay.style.display = 'flex';
}

function closeModal() {
  const overlay = document.getElementById('modal-overlay');
  if (overlay) overlay.style.display = 'none';
}

// ─── PWA INSTALL ───────────────────────────────────────────────
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  // Show install button after 3 seconds
  setTimeout(() => {
    showToast('💡 Tap menu → "Add to Home Screen" to install as app');
  }, 3000);
});

// ─── START ─────────────────────────────────────────────────────
init();
</script>
