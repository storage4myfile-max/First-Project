<style>
:root{
  --bg:#0A0F1E;--bg2:#111827;--bg3:#1A2235;--bg4:#1E2A40;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#F0F4FF;--text2:#8899BB;--text3:#55688A;
  --gold:#C8A96E;--gold2:#E8C98E;--gold3:#A07840;
  --green:#4ADE80;--red:#F87171;--blue:#60A5FA;
  --purple:#A78BFA;--amber:#FCD34D;--teal:#2DD4BF;
  --font-serif:'DM Serif Display',Georgia,serif;
  --font-sans:'DM Sans',system-ui,sans-serif;
  --r:12px;--r2:8px;--r3:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none;background:var(--bg)}
body{font-family:var(--font-sans);color:var(--text);font-size:14px;max-width:480px;margin:0 auto;position:relative}

/* SPLASH */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;gap:6px;transition:opacity .5s}
.splash-logo{font-size:52px;margin-bottom:8px;animation:floatIn .6s ease}
.splash-brand{font-family:var(--font-serif);font-size:28px;color:var(--gold);letter-spacing:.04em}
.splash-sub{font-size:12px;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;margin-top:2px}
.splash-tagline{font-size:11px;color:var(--text3);margin-top:16px;font-style:italic}
.splash-dots{display:flex;gap:6px;margin-top:20px}
.splash-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);animation:pulse 1.2s infinite alternate}
.splash-dot:nth-child(2){animation-delay:.2s}.splash-dot:nth-child(3){animation-delay:.4s}
@keyframes floatIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{from{opacity:.2;transform:scale(.7)}to{opacity:1;transform:scale(1)}}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
.topbar-left{display:flex;flex-direction:column}
.topbar-brand{font-family:var(--font-serif);font-size:18px;color:var(--gold);letter-spacing:.03em;line-height:1.1}
.topbar-sub{font-size:10px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-top:1px}
.topbar-right{display:flex;gap:8px;align-items:center}
.icon-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border2);background:var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;color:var(--text2);position:relative;transition:all .15s}
.icon-btn:active{background:var(--bg4)}
.notif-pip{background:var(--red);color:#fff;border-radius:10px;font-size:9px;font-weight:700;padding:1px 5px;position:absolute;top:-3px;right:-3px;display:none}

/* TABS */
.tabs{display:flex;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:57px;z-index:99;overflow-x:auto}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:70px;padding:9px 4px;text-align:center;font-size:11px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;letter-spacing:.02em}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}

/* CONTENT */
.content{padding:14px;padding-bottom:80px;min-height:calc(100vh - 100px)}

/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:13px;position:relative;overflow:hidden}
.stat-card::after{content:'';position:absolute;top:-15px;right:-15px;width:50px;height:50px;border-radius:50%;background:var(--gold);opacity:.06}
.stat-num{font-family:var(--font-serif);font-size:24px;color:var(--gold);line-height:1}
.stat-lbl{font-size:10px;color:var(--text3);margin-top:3px;font-weight:500;text-transform:uppercase;letter-spacing:.06em}
.stat-sub{font-size:11px;color:var(--text2);margin-top:2px}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:12px}
.card-head{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:12px;font-weight:600;color:var(--text);letter-spacing:.04em;text-transform:uppercase}

/* BADGES */
.badge{display:inline-flex;align-items:center;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;letter-spacing:.03em}
.badge-gold{background:rgba(200,169,110,.12);color:var(--gold);border:1px solid rgba(200,169,110,.25)}
.badge-blue{background:rgba(96,165,250,.1);color:var(--blue);border:1px solid rgba(96,165,250,.2)}
.badge-green{background:rgba(74,222,128,.1);color:var(--green);border:1px solid rgba(74,222,128,.2)}
.badge-red{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.2)}
.badge-purple{background:rgba(167,139,250,.1);color:var(--purple);border:1px solid rgba(167,139,250,.2)}
.badge-amber{background:rgba(252,211,77,.1);color:var(--amber);border:1px solid rgba(252,211,77,.2)}
.badge-teal{background:rgba(45,212,191,.1);color:var(--teal);border:1px solid rgba(45,212,191,.2)}

/* CLIENT ROWS */
.client-row{display:flex;align-items:center;gap:11px;padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.client-row:last-child{border-bottom:none}
.client-row:active{background:var(--bg3)}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-serif);font-size:14px;flex-shrink:0;border:1px solid var(--border2)}
.av0{background:rgba(96,165,250,.15);color:var(--blue)}
.av1{background:rgba(167,139,250,.15);color:var(--purple)}
.av2{background:rgba(74,222,128,.15);color:var(--green)}
.av3{background:rgba(200,169,110,.15);color:var(--gold)}
.av4{background:rgba(248,113,113,.15);color:var(--red)}
.av5{background:rgba(45,212,191,.15);color:var(--teal)}
.client-info{flex:1;min-width:0}
.client-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.client-meta{font-size:11px;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.risk-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.client-right{text-align:right;flex-shrink:0}
.client-sip{font-size:12px;font-weight:600;color:var(--gold)}
.client-seg{font-size:10px;color:var(--text3);margin-top:2px}
.alert-tag{font-size:10px;font-weight:600}

/* NOTIF */
.notif-row{display:flex;gap:11px;padding:11px 14px;border-bottom:1px solid var(--border);align-items:flex-start}
.notif-row:last-child{border-bottom:none}
.notif-icon{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;margin-top:1px}
.notif-body{flex:1;min-width:0}
.notif-title{font-size:12px;font-weight:500;color:var(--text);line-height:1.3}
.notif-desc{font-size:11px;color:var(--text3);margin-top:3px;line-height:1.5}
.notif-time{font-size:10px;color:var(--text3);margin-top:3px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;font-size:12px;font-weight:500;border-radius:var(--r2);border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .15s;font-family:var(--font-sans)}
.btn:active{transform:scale(.97);opacity:.85}
.btn-gold{background:var(--gold);color:#0A0F1E;border-color:var(--gold);font-weight:600}
.btn-gold:hover{background:var(--gold2)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-row{display:flex;gap:7px;flex-wrap:wrap;padding:11px 14px;border-top:1px solid var(--border)}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap input{width:100%;padding:9px 12px 9px 36px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);font-size:13px;font-family:var(--font-sans);outline:none}
.search-wrap input:focus{border-color:rgba(200,169,110,.4)}
.search-wrap input::placeholder{color:var(--text3)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--text3)}

/* PROFILE */
.profile-header{background:linear-gradient(135deg,var(--bg3) 0%,var(--bg2) 100%);border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.profile-brand-strip{background:rgba(200,169,110,.08);border-bottom:1px solid rgba(200,169,110,.12);padding:6px 14px;display:flex;align-items:center;justify-content:space-between}
.profile-brand-name{font-family:var(--font-serif);font-size:11px;color:var(--gold);letter-spacing:.08em}
.profile-brand-arn{font-size:10px;color:var(--text3)}
.profile-hero{padding:16px 14px;display:flex;gap:13px;align-items:flex-start}
.profile-avatar-lg{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-serif);font-size:20px;border:2px solid rgba(200,169,110,.4);flex-shrink:0}
.profile-name{font-family:var(--font-serif);font-size:19px;color:var(--text);line-height:1.1}
.profile-firm{font-size:11px;color:var(--text3);margin-top:2px}
.profile-badges{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
.profile-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 14px;border-top:1px solid var(--border)}
.pstat-val{font-family:var(--font-serif);font-size:18px;color:var(--gold)}
.pstat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-top:1px}

/* FIELDS */
.fields-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.fields-section-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;padding:9px 14px;border-bottom:1px solid var(--border);background:var(--bg3)}
.fields-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:13px 14px}
.field-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.field-val{font-size:12px;color:var(--text);font-weight:500;word-break:break-word}
.field-val-link{color:var(--blue);text-decoration:none}

/* SIP HISTORY */
.sip-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border)}
.sip-row:last-child{border-bottom:none}
.sip-date{font-size:10px;color:var(--text3);width:72px;flex-shrink:0}
.sip-amount{font-size:13px;font-weight:600;color:var(--gold)}
.sip-change{font-size:10px;color:var(--green);margin-left:auto}
.sip-change.down{color:var(--red)}

/* FORM */
.form-wrap{display:flex;flex-direction:column;gap:13px}
.form-section-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;padding:8px 0 4px;border-bottom:1px solid var(--border);margin-bottom:2px}
.form-group label{display:block;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 11px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r2);color:var(--text);font-size:13px;font-family:var(--font-sans);outline:none;transition:border-color .15s;-webkit-appearance:none}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:rgba(200,169,110,.5)}
.form-group select option{background:var(--bg2)}
.form-group textarea{resize:none;height:65px;line-height:1.5}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-actions{display:flex;gap:10px;padding-top:6px}

/* CAL */
.cal-month-label{font-family:var(--font-serif);font-size:15px;color:var(--gold);margin:14px 0 7px;padding:0 2px}
.cal-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border);cursor:pointer}
.cal-row:last-child{border-bottom:none}
.cal-row:active{background:var(--bg3)}
.cal-date-box{width:36px;height:36px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.cal-day{font-size:15px;font-weight:600;color:var(--text);line-height:1}
.cal-mon{font-size:9px;color:var(--text3);text-transform:uppercase}

/* FAMILY LINK */
.family-row{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid var(--border);cursor:pointer}
.family-row:last-child{border-bottom:none}
.family-row:active{background:var(--bg3)}

/* SEC LABEL */
.sec-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin:14px 0 7px;padding:0 2px}

/* EMPTY */
.empty-state{padding:36px 20px;text-align:center;color:var(--text3);font-size:13px}
.empty-icon{font-size:28px;margin-bottom:8px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:none;align-items:flex-end;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border-radius:var(--r) var(--r) 0 0;padding:20px;width:100%;max-height:92vh;overflow-y:auto;border-top:1px solid var(--border2);animation:slideUp .25s ease}
.modal-title{font-family:var(--font-serif);font-size:19px;color:var(--gold);margin-bottom:16px}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* TOAST */
.toast{position:fixed;bottom:86px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r2);padding:9px 16px;font-size:12px;color:var(--text);z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;max-width:90vw}
.toast.show{opacity:1}

/* FAB */
.fab{position:fixed;bottom:18px;right:18px;width:50px;height:50px;border-radius:50%;background:var(--gold);color:#0A0F1E;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;box-shadow:0 4px 20px rgba(200,169,110,.35);z-index:200;transition:transform .15s;border:none;font-weight:300}
.fab:active{transform:scale(.9)}

/* BACK */
.back-btn{display:flex;align-items:center;gap:5px;color:var(--text2);font-size:12px;cursor:pointer;margin-bottom:12px;padding:3px 0;text-transform:uppercase;letter-spacing:.06em;font-weight:500}
.back-btn:active{color:var(--gold)}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:30px;gap:8px;color:var(--text3);font-size:12px}
.spinner{width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.divider{height:1px;background:var(--border);margin:4px 0}
.text-gold{color:var(--gold)}
.text-green{color:var(--green)}
.text-red{color:var(--red)}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-logo">🪷</div>
  <div class="splash-brand">VED Investment</div>
  <div class="splash-sub">ARN-253228 · Nadiad, Gujarat</div>
  <div class="splash-tagline">"Chasing client goals, not their money."</div>
  <div class="splash-dots">
    <div class="splash-dot"></div>
    <div class="splash-dot"></div>
    <div class="splash-dot"></div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-brand">🪷 VED Investment</div>
      <div class="topbar-sub">ClientBook · ARN-253228</div>
    </div>
    <div class="topbar-right">
      <div class="icon-btn" onclick="switchTab('notifications')" style="position:relative">
        🔔<span class="notif-pip" id="notif-pip">0</span>
      </div>
      <div class="icon-btn" onclick="openAddModal()">＋</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="dashboard" onclick="switchTab('dashboard')">Dashboard</div>
    <div class="tab" data-tab="clients" onclick="switchTab('clients')">Clients</div>
    <div class="tab" data-tab="alerts" onclick="switchTab('alerts')">Alerts</div>
    <div class="tab" data-tab="calendar" onclick="switchTab('calendar')">Calendar</div>
    <div class="tab" data-tab="sip" onclick="switchTab('sip')">SIP Tracker</div>
  </div>

  <div class="content" id="content"></div>
  <button class="fab" onclick="openAddModal()">＋</button>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal-content"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://udtxlsfqrwfbqgfshayg.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVkdHhsc2ZxcndmYnFnZnNoYXlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NjY3NzcsImV4cCI6MjA5MzU0Mjc3N30.AB8KneZsKL_OYt8ab8Ytpn65p-l6n3FA7-CxHharcwo';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let activeTab = 'dashboard';
let clients = [];
let notifications = [];
let sipHistory = [];
let selectedClient = null;
let editMode = false;

// ── INIT ─────────────────────────────────────────────────────
async function init() {
  await Promise.all([loadClients(), loadNotifications(), loadSipHistory()]);
  await generateAutoNotifications();
  hideSplash();
  render();
  updateBadge();
}

function hideSplash() {
  const s = document.getElementById('splash');
  s.style.opacity = '0';
  setTimeout(() => { s.style.display = 'none'; document.getElementById('app').style.display = 'block'; }, 500);
}

// ── DATA ─────────────────────────────────────────────────────
async function loadClients() {
  const { data, error } = await sb.from('clients').select('*').order('name');
  if (!error) clients = data || [];
}

async function loadNotifications() {
  const { data } = await sb.from('notifications').select('*').order('created_at', { ascending: false });
  notifications = data || [];
}

async function loadSipHistory() {
  const { data } = await sb.from('sip_history').select('*').order('change_date', { ascending: false });
  sipHistory = data || [];
}

async function generateAutoNotifications() {
  for (const c of clients) {
    // Birthday alerts
    if (c.dob) {
      const days = daysUntil(c.dob);
      if (days <= 7) {
        const exists = notifications.find(n => n.client_id === c.id && n.type === 'birthday' && !n.is_done);
        if (!exists) {
          const title = days === 0 ? `🎂 Birthday TODAY — ${c.name}` : `🎂 Birthday in ${days}d — ${c.name}`;
          await sb.from('notifications').insert({ client_id: c.id, type: 'birthday', title, description: `${c.name}'s birthday ${days === 0 ? 'is today' : 'is in ' + days + ' days'}. Send a warm wish!`, due_date: c.dob });
        }
      }
    }
    // Anniversary alerts
    if (c.anniversary) {
      const days = daysUntil(c.anniversary);
      if (days <= 7) {
        const exists = notifications.find(n => n.client_id === c.id && n.type === 'anniversary' && !n.is_done);
        if (!exists) {
          await sb.from('notifications').insert({ client_id: c.id, type: 'anniversary', title: `💍 Anniversary ${days === 0 ? 'TODAY' : 'in ' + days + 'd'} — ${c.name}`, description: `${c.name}'s wedding anniversary. A thoughtful message goes a long way!`, due_date: c.anniversary });
        }
      }
    }
    // SIP step-up reminder (April each year)
    const now = new Date();
    if (now.getMonth() === 3) { // April
      const exists = notifications.find(n => n.client_id === c.id && n.type === 'sip_stepup' && !n.is_done);
      if (!exists && c.current_sip > 0) {
        await sb.from('notifications').insert({ client_id: c.id, type: 'sip_stepup', title: `📈 SIP Step-Up — ${c.name}`, description: `April is the ideal time to review and increase ${c.name}'s SIP. Current SIP: ₹${parseInt(c.current_sip).toLocaleString('en-IN')}/mo` });
      }
    }
  }
  await loadNotifications();
}

async function saveClient(data) {
  let error;
  if (editMode && selectedClient) {
    ({ error } = await sb.from('clients').update(data).eq('id', selectedClient.id));
    if (!error) { showToast('Client updated ✓'); selectedClient = { ...selectedClient, ...data }; }
  } else {
    ({ error } = await sb.from('clients').insert(data));
    if (!error) showToast('Client added ✓');
  }
  if (error) { showToast('Error: ' + error.message); return; }
  await loadClients();
  await generateAutoNotifications();
  updateBadge();
  closeModal();
  render();
}

async function saveSipChange(clientId, newAmount, note) {
  const client = clients.find(c => c.id === clientId);
  const oldAmount = client?.current_sip || 0;
  const pct = oldAmount > 0 ? (((newAmount - oldAmount) / oldAmount) * 100).toFixed(1) : null;
  await sb.from('sip_history').insert({
    client_id: clientId,
    old_amount: oldAmount,
    new_amount: newAmount,
    change_pct: pct,
    change_date: new Date().toISOString().split('T')[0],
    note: note || null
  });
  await sb.from('clients').update({ current_sip: newAmount }).eq('id', clientId);
  await loadClients();
  await loadSipHistory();
  showToast(`SIP updated to ₹${parseInt(newAmount).toLocaleString('en-IN')} ✓`);
  selectedClient = clients.find(c => c.id === clientId);
  render();
}

async function dismissNotif(id) {
  await sb.from('notifications').update({ is_done: true }).eq('id', id);
  notifications = notifications.map(n => n.id === id ? { ...n, is_done: true } : n);
  updateBadge();
  render();
}

async function deleteClient(id) {
  if (!confirm('Delete this client? All data including SIP history will be removed.')) return;
  await sb.from('clients').delete().eq('id', id);
  await loadClients();
  selectedClient = null;
  render();
  showToast('Client deleted');
}

// ── HELPERS ──────────────────────────────────────────────────
function daysUntil(dateStr) {
  const d = new Date(dateStr);
  const today = new Date(); today.setHours(0,0,0,0);
  let next = new Date(today.getFullYear(), d.getMonth(), d.getDate());
  if (next < today) next.setFullYear(today.getFullYear() + 1);
  return Math.round((next - today) / 86400000);
}

function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d);
  return `${dt.getDate()} ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][dt.getMonth()]} ${dt.getFullYear()}`;
}

function fmtDateShort(d) {
  if (!d) return '—';
  const dt = new Date(d);
  return `${dt.getDate()} ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][dt.getMonth()]}`;
}

function fmtAnniv(d) {
  if (!d) return null;
  const days = daysUntil(d);
  if (days === 0) return '💍 Anniversary TODAY!';
  if (days <= 7) return `💍 Anniv. in ${days}d`;
  return null;
}

function fmtBday(d) {
  if (!d) return '—';
  const days = daysUntil(d);
  if (days === 0) return '🎂 Today!';
  if (days <= 7) return `🎂 in ${days}d`;
  return fmtDateShort(d);
}

function initials(name) { return name.split(' ').map(x => x[0]).join('').slice(0,2).toUpperCase(); }
function avIdx(id) { return (id.charCodeAt(0) + id.charCodeAt(1)) % 6; }
function riskColor(r) { return r === 'Aggressive' ? '#F87171' : r === 'Moderate' ? '#FCD34D' : '#4ADE80'; }
function fmtINR(n) { return n ? '₹' + parseInt(n).toLocaleString('en-IN') : '—'; }

function updateBadge() {
  const n = notifications.filter(x => !x.is_done).length;
  const pip = document.getElementById('notif-pip');
  if (pip) { pip.textContent = n; pip.style.display = n > 0 ? 'block' : 'none'; }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function switchTab(tab) {
  activeTab = tab; selectedClient = null;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  render();
}

function openProfile(id) {
  selectedClient = clients.find(c => c.id === id);
  activeTab = 'clients';
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === 'clients'));
  render(); window.scrollTo(0,0);
}

// ── RENDER ────────────────────────────────────────────────────
function render() {
  const el = document.getElementById('content');
  if (activeTab === 'dashboard') el.innerHTML = renderDashboard();
  else if (activeTab === 'clients') el.innerHTML = selectedClient ? renderProfile() : renderClients();
  else if (activeTab === 'alerts') el.innerHTML = renderAlerts();
  else if (activeTab === 'calendar') el.innerHTML = renderCalendar();
  else if (activeTab === 'sip') el.innerHTML = renderSipTracker();
}

// ── DASHBOARD ─────────────────────────────────────────────────
function renderDashboard() {
  const totalSip = clients.reduce((s,c) => s + (parseFloat(c.current_sip)||0), 0);
  const upcoming = clients.filter(c => (c.dob && daysUntil(c.dob) <= 30) || (c.anniversary && daysUntil(c.anniversary) <= 30));
  const pending = notifications.filter(n => !n.is_done).length;
  const hni = clients.filter(c => c.segment === 'HNI').length;

  return `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num">${clients.length}</div><div class="stat-lbl">Total Clients</div><div class="stat-sub">${hni} HNI · ${clients.length - hni} Retail</div></div>
      <div class="stat-card"><div class="stat-num">${fmtINR(totalSip)}</div><div class="stat-lbl">Monthly SIP</div><div class="stat-sub">Across all clients</div></div>
      <div class="stat-card"><div class="stat-num">${upcoming.length}</div><div class="stat-lbl">Occasions (30d)</div><div class="stat-sub">Birthdays & anniversaries</div></div>
      <div class="stat-card"><div class="stat-num">${pending}</div><div class="stat-lbl">Pending Alerts</div><div class="stat-sub">${pending > 0 ? 'Action needed' : 'All clear ✓'}</div></div>
    </div>

    ${upcoming.length ? `
    <div class="sec-label">Upcoming Occasions</div>
    <div class="card">
      ${upcoming.sort((a,b) => {
        const da = a.dob ? daysUntil(a.dob) : 999;
        const db = b.dob ? daysUntil(b.dob) : 999;
        return da - db;
      }).slice(0,5).map(c => {
        const bdays = c.dob ? daysUntil(c.dob) : 999;
        const annivs = c.anniversary ? daysUntil(c.anniversary) : 999;
        const isAnniv = annivs < bdays;
        const days = isAnniv ? annivs : bdays;
        return `<div class="client-row" onclick="openProfile('${c.id}')">
          <div class="avatar av${avIdx(c.id)}">${initials(c.name)}</div>
          <div class="client-info">
            <div class="client-name">${c.name}</div>
            <div class="client-meta">${isAnniv ? '💍 Anniversary' : '🎂 Birthday'} · ${c.city||'—'}</div>
          </div>
          <div class="client-right">
            <div class="alert-tag ${days===0?'text-gold':'text-amber'}">${days===0?'TODAY':'in '+days+'d'}</div>
            <div class="client-seg">${c.segment||'Retail'}</div>
          </div>
        </div>`;
      }).join('')}
    </div>` : ''}

    ${pending > 0 ? `
    <div class="sec-label">Active Alerts</div>
    <div class="card">
      ${notifications.filter(n=>!n.is_done).slice(0,3).map(n => `
        <div class="notif-row">
          <div class="notif-icon" style="background:rgba(200,169,110,.08)">${n.type==='birthday'?'🎂':n.type==='anniversary'?'💍':n.type==='sip_stepup'?'📈':'🔔'}</div>
          <div class="notif-body">
            <div class="notif-title">${n.title}</div>
            <div class="notif-desc">${n.description||''}</div>
          </div>
          <button class="btn btn-sm" onclick="dismissNotif('${n.id}')">✓</button>
        </div>`).join('')}
    </div>` : `
    <div class="card" style="padding:20px;text-align:center">
      <div style="font-size:22px;margin-bottom:6px">✨</div>
      <div style="color:var(--text2);font-size:13px">All clear — no pending alerts</div>
    </div>`}

    <div class="sec-label">All Clients</div>
    <div class="card">
      ${clients.slice(0,5).map(c => `
        <div class="client-row" onclick="openProfile('${c.id}')">
          <div class="avatar av${avIdx(c.id)}">${initials(c.name)}</div>
          <div class="client-info">
            <div class="client-name">${c.name}</div>
            <div class="client-meta"><span class="risk-dot" style="background:${riskColor(c.risk_profile)}"></span>${c.risk_profile||'—'} · ${c.horizon||'—'}</div>
          </div>
          <div class="client-right">
            <div class="client-sip">${c.current_sip ? fmtINR(c.current_sip)+'/mo' : '—'}</div>
            <div class="client-seg">${c.segment||'Retail'}</div>
          </div>
        </div>`).join('')}
      ${clients.length > 5 ? `<div style="padding:10px 14px;text-align:center;font-size:11px;color:var(--text3);cursor:pointer" onclick="switchTab('clients')">View all ${clients.length} clients →</div>` : ''}
    </div>`;
}

// ── CLIENTS LIST ──────────────────────────────────────────────
function renderClients() {
  return `
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="Search name, city, firm, risk..." oninput="filterClients(this.value)">
    </div>
    <div id="clients-list">${renderClientRows(clients)}</div>`;
}

function renderClientRows(list) {
  if (!list.length) return `<div class="empty-state"><div class="empty-icon">👥</div>No clients found</div>`;
  return `<div class="card">${list.map(c => `
    <div class="client-row" onclick="openProfile('${c.id}')">
      <div class="avatar av${avIdx(c.id)}">${initials(c.name)}</div>
      <div class="client-info">
        <div class="client-name">${c.name}</div>
        <div class="client-meta">
          <span class="risk-dot" style="background:${riskColor(c.risk_profile)}"></span>
          ${c.risk_profile||'—'} · ${c.city||'—'}

    </div>`).join('')}</div>`;
}

function filterClients(q) {
  const filtered = clients.filter(c =>
    c.name.toLowerCase().includes(q.toLowerCase()) ||
    (c.city||'').toLowerCase().includes(q.toLowerCase()) ||
    (c.firm||'').toLowerCase().includes(q.toLowerCase()) ||
    (c.risk_profile||'').toLowerCase().includes(q.toLowerCase()) ||
    (c.occupation||'').toLowerCase().includes(q.toLowerCase())
  );
  document.getElementById('clients-list').innerHTML = renderClientRows(filtered);
}

function renderAlerts() {
  const active = notifications.filter(n => !n.is_done);
  const done = notifications.filter(n => n.is_done).slice(0,5);
  const typeIcon = t => t==='birthday'?'🎂':t==='anniversary'?'💍':t==='sip_stepup'?'📈':t==='kyc'?'🔔':'📋';

  return `
    ${active.length === 0 ? `
    <div class="card" style="padding:28px;text-align:center">
      <div style="font-size:28px;margin-bottom:8px">✅</div>
      <div style="color:var(--text2);font-size:13px">All caught up!</div>
    </div>` :
    `<div class="sec-label">${active.length} Pending Alert${active.length>1?'s':''}</div>
    <div class="card">
      ${active.map(n => {
        const client = clients.find(c => c.id === n.client_id);
        return `<div class="notif-row">
          <div class="notif-icon" style="background:rgba(200,169,110,.08)">${typeIcon(n.type)}</div>
          <div class="notif-body">
            <div class="notif-title">${n.title}</div>
            <div class="notif-desc">${n.description||''}</div>
            <div class="notif-time">${n.due_date ? fmtDateShort(n.due_date) : ''}</div>
          </div>
          <button class="btn btn-sm" onclick="dismissNotif('${n.id}')">Done</button>
        </div>`;
      }).join('')}
    </div>`}

    ${done.length ? `
    <div class="sec-label">Completed</div>
    <div class="card">
      ${done.map(n => `
        <div class="notif-row" style="opacity:.4">
          <div class="notif-icon" style="background:rgba(74,222,128,.08)">✓</div>
          <div class="notif-body"><div class="notif-title">${n.title}</div></div>
        </div>`).join('')}
    </div>` : ''}`;
}

// ── CALENDAR ──────────────────────────────────────────────────
function renderCalendar() {
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  
  // Collect all occasions
  const occasions = [];
  clients.forEach(c => {
    if (c.dob) occasions.push({ client: c, date: c.dob, type: 'birthday', icon: '🎂' });
    if (c.anniversary) occasions.push({ client: c, date: c.anniversary, type: 'anniversary', icon: '💍' });
  });

  if (!occasions.length) return `<div class="empty-state"><div class="empty-icon">📅</div>No occasions added yet</div>`;

  const byMonth = {};
  occasions.forEach(o => {
    const m = new Date(o.date).getMonth();
    if (!byMonth[m]) byMonth[m] = [];
    byMonth[m].push(o);
  });

  return months.map((m,i) => {
    const list = byMonth[i];
    if (!list) return '';
    return `
      <div class="cal-month-label">${m}</div>
      <div class="card">
        ${list.sort((a,b) => new Date(a.date).getDate()-new Date(b.date).getDate()).map(o => {
          const d = new Date(o.date);
          const days = daysUntil(o.date);
          return `<div class="cal-row" onclick="openProfile('${o.client.id}')">
            <div class="cal-date-box" style="${days<=7?'border-color:var(--gold)':''}">
              <div class="cal-day" style="${days<=7?'color:var(--gold)':''}">${d.getDate()}</div>
              <div class="cal-mon">${m.slice(0,3)}</div>
            </div>
            <div class="avatar av${avIdx(o.client.id)}" style="width:34px;height:34px;font-size:12px">${initials(o.client.name)}</div>
            <div class="client-info">
              <div class="client-name">${o.client.name} ${o.icon}</div>
              <div class="client-meta">${days===0?'Today!':days<=30?'in '+days+' days':'upcoming'} · ${o.client.segment||'Retail'}</div>
            </div>
            ${days<=7 ? `<span class="badge badge-amber">${days===0?'Today':days+'d'}</span>` : ''}
          </div>`;
        }).join('')}
      </div>`;
  }).join('');
}

    </div>

    <div class="sec-label">SIP by Client</div>
    <div class="card">
      ${clients.sort((a,b) => (b.current_sip||0)-(a.current_sip||0)).map(c => {

            </div>

          <div class="client-right">
            <div class="client-sip">${c.current_sip ? fmtINR(c.current_sip) : '—'}</div>
            <button class="btn btn-sm" style="margin-top:3px" onclick="event.stopPropagation();openSipModal('${c.id}')">Update</button>
          </div>
        </div>`;
      }).join('')}
    </div>

    <div class="sec-label">Recent SIP Changes</div>
    <div class="card">
      ${sipHistory.slice(0,10).map(s => {
        const client = clients.find(c => c.id === s.client_id);
        return `<div class="sip-row">
          <div>
            <div style="font-size:12px;font-weight:500;color:var(--text)">${client?.name||'—'}</div>

          </div>
        </div>`;
      }).join('') || '<div class="empty-state"><div class="empty-icon">📊</div>No SIP changes recorded yet</div>'}
    </div>`;
}

        <div class="form-group"><label>SIP Debit Date</label><input id="f-debit" type="number" value="${c.sip_debit_date||''}" min="1" max="28"></div>
      </div>
      <div class="form-group"><label>Notes</label><textarea id="f-notes">${c.notes||''}</textarea></div>
      <div class="form-actions">
        <button class="btn btn-gold" style="flex:1" onclick="submitClientForm()">Update Client</button>
        <button class="btn" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  `);
}

function openSipModal(clientId) {
  const c = clients.find(x => x.id === clientId);
  showModal(`
    <div class="modal-title">SIP Change — ${c.name}</div>
    <div class="form-wrap">
      <div style="background:var(--bg3);border-radius:var(--r2);padding:12px;margin-bottom:4px">
        <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Current SIP</div>
        <div style="font-family:var(--font-serif);font-size:22px;color:var(--gold);margin-top:2px">${c.current_sip ? fmtINR(c.current_sip)+'/mo' : 'Not set'}</div>
      </div>
      <div class="form-group"><label>New SIP Amount (₹) *</label><input id="sip-new" type="number" placeholder="e.g. 15000" value="${c.current_sip||''}"></div>
      <div class="form-group"><label>Note / Reason</label><input id="sip-note" type="text" placeholder="e.g. Annual step-up, Goal added..."></div>
      <div class="form-actions">
        <button class="btn btn-gold" style="flex:1" onclick="submitSipChange('${clientId}')">Save SIP Change</button>
        <button class="btn" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  `);
}

function submitClientForm() {
  const name = document.getElementById('f-name').value.trim();
  const dob = document.getElementById('f-dob').value;
  if (!name || !dob) { showToast('Name and DOB are required'); return; }
  const data = {
    name, dob,
    anniversary: document.getElementById('f-anniv').value || null,
    phone: document.getElementById('f-phone').value.trim() || null,
    whatsapp: document.getElementById('f-whatsapp').value.trim() || null,
    email: document.getElementById('f-email').value.trim() || null,
    pan: (document.getElementById('f-pan').value.trim()||'').toUpperCase() || null,
    city: document.getElementById('f-city').value.trim() || null,
    occupation: document.getElementById('f-occ').value.trim() || null,
    firm: document.getElementById('f-firm').value.trim() || null,
    nominee: document.getElementById('f-nominee').value.trim() || null,
    preferred_lang: document.getElementById('f-lang').value || null,
    segment: document.getElementById('f-segment').value,
    risk_profile: document.getElementById('f-risk').value,
    horizon: document.getElementById('f-horizon').value,
    risk_score: document.getElementById('f-rscore').value ? parseInt(document.getElementById('f-rscore').value) : null,
    platform: document.getElementById('f-platform').value || null,
    risk_profile_date: document.getElementById('f-rpdate').value || null,
    current_sip: document.getElementById('f-sip').value ? parseFloat(document.getElementById('f-sip').value) : null,
    sip_debit_date: document.getElementById('f-debit').value ? parseInt(document.getElementById('f-debit').value) : null,
    notes: document.getElementById('f-notes').value.trim() || null,
  };
  saveClient(data);
}

function submitSipChange(clientId) {
  const newAmt = parseFloat(document.getElementById('sip-new').value);
  const note = document.getElementById('sip-note').value.trim();
  if (!newAmt || newAmt <= 0) { showToast('Please enter a valid SIP amount'); return; }
  saveSipChange(clientId, newAmt, note);
  closeModal();
}

function showModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

// ── SUPABASE SCHEMA CHECK ─────────────────────────────────────
async function ensureSchema() {
  // Try to query sip_history — if it fails, the table doesnt exist yet
  const { error } = await sb.from('sip_history').select('id').limit(1);
  if (error && error.code === '42P01') {
    showToast('Run schema update in Supabase SQL Editor');
  }
}

init();
ensureSchema();
</script>
</body>
</html>
